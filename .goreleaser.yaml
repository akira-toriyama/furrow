version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: furrow
    main: ./cmd/furrow
    binary: furrow
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/akira-toriyama/furrow/internal/version.Version={{.Version}}
      - -X github.com/akira-toriyama/furrow/internal/version.Commit={{.FullCommit}}
      - -X github.com/akira-toriyama/furrow/internal/version.Date={{.CommitDate}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# SBOM per archive (audit F10 follow-up to the build-provenance work in #77).
# syft catalogs each tar.gz and writes an SPDX-JSON document beside it;
# GoReleaser adds these to the release assets and to checksums.txt, and
# release.yml then attests each one (actions/attest-sbom) so the SBOM is both
# discoverable (a release asset) and verifiable (a signed attestation). The
# runner installs syft via download-syft (it is not preinstalled — without it
# this pipe fails the release). Args are pinned to a deterministic spdx-json
# output (no network enrichment) to keep the release reproducible.
#
# The SPDX version is pinned to 2.3 on purpose: actions/attest derives the
# attestation's predicateType FROM the document ("SPDX-2.3" ->
# https://spdx.dev/Document/v2.3), so letting syft's default float would silently
# change the predicate type users must pass to `gh attestation verify` — the
# command the READMEs document. Pinning keeps doc and artifact in lockstep. A
# syft failure here aborts GoReleaser BEFORE anything is published (safe).
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.sbom.json"
    args: ["$artifact", "--output", "spdx-json@2.3=$document"]

# Homebrew cask pushed to the family tap on release. GoReleaser v2 ships
# prebuilt binaries as CASKS (the old `brews:` formula path is deprecated); the
# live Casks/furrow.rb in akira-toriyama/homebrew-tap is regenerated each
# release. Install: brew install akira-toriyama/tap/furrow.
homebrew_casks:
  - repository:
      owner: akira-toriyama
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/akira-toriyama/furrow
    description: "Clonable, git-native plain-text task tracker — an alternative to GitHub Projects/Issues"
    # The binary is unsigned; strip the quarantine xattr on macOS so Gatekeeper
    # allows launch (same pattern as the family's other casks).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/furrow"]
          end

release:
  # Rolling-draft: pushes refresh a draft; publish (or tag) cuts the release.
  draft: true

# Nix: the primary nix story is the in-repo flake.nix (`nix run
# github:akira-toriyama/furrow`). A GoReleaser nix block (push to a NUR repo)
# is deferred until that repo + NUR_TOKEN exist.
