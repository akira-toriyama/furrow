# golangci-lint v2 config for furrow. Conservative, fast linters that catch real
# bugs and keep style consistent without fighting the developer.
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive
    - gosec
  settings:
    gosec:
      # Not the full gosec ruleset — only the two rules that guard the
      # exec and file-read surfaces. Every real subprocess launch (G204,
      # internal/gitrepo + the $EDITOR spawn) and variable-path file read
      # (G304, config/app path resolution) must then carry an explicit
      # `#nosec Gxxx -- <reason>` justification, so the guard-rail is a
      # documented triage rather than a blanket suppression.
      includes:
        - G204
        - G304
    errcheck:
      # Writes to stdout/stderr via fmt.Fprint* in a CLI are best-effort (a
      # broken pipe is not actionable); don't require checking them.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        # cobra RunE handlers have a fixed (cmd, args) signature; an unused one
        # is unavoidable, not a smell.
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      # tests may ignore errors freely, and legitimately read golden files by
      # variable path (G304) and exec git with variable args (G204).
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
