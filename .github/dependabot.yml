# Dependabot for furrow. Commit messages carry the gitmoji + Conventional prefix
# so commit-lint.yml stays green on bot PRs (docs/commit-convention.md).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels: ["dependencies", "github-actions"]

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      gomod:
        patterns: ["*"]
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels: ["dependencies", "go"]
