name: release

# Tag-driven release: pushing a vX.Y.Z tag runs git-cliff + GoReleaser (binaries,
# checksums, Homebrew cask). Deliberately NOT on every main push — that would run
# GoReleaser with no tag (and before HOMEBREW_TAP_TOKEN exists) and fail. Use
# workflow_dispatch for a manual dry run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --release-notes CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to akira-toriyama/homebrew-tap (and nur-packages).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
