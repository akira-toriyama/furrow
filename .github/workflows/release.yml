name: release

# Tag-driven release: pushing a vX.Y.Z tag runs git-cliff + GoReleaser (binaries,
# checksums, Homebrew cask). Deliberately NOT on every main push — that would run
# GoReleaser with no tag (and before HOMEBREW_TAP_TOKEN exists) and fail. Use
# workflow_dispatch for a manual dry run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # mint the OIDC token that signs the build-provenance attestation
  attestations: write # publish the provenance attestation to the repo

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # go-version: 'stable' + a floor-only go.mod — see build.yml. Ships
      # release binaries built on the current, patched Go without pinning a
      # toolchain that non-CI builds (nix, source installs) may not have.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true

      # syft is required by GoReleaser's `sboms` pipe (it is NOT preinstalled on
      # the runner); without it the release fails when it tries to catalog each
      # archive. download-syft only fetches the binary (no cataloging here).
      - name: install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: generate release notes (git-cliff)
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          # Write OUTSIDE the work tree: a CHANGELOG.md in the repo root leaves an
          # untracked file, and GoReleaser's git-state check then aborts with
          # "git is in a dirty state". runner.temp is off-tree, so the release
          # notes are generated without dirtying the checkout.
          OUTPUT: ${{ runner.temp }}/CHANGELOG.md

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Pin the GoReleaser tool to the v2 line (never `latest`) so a major
          # bump can't silently change the release build.
          version: "~> 2"
          args: release --clean --release-notes ${{ runner.temp }}/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to akira-toriyama/homebrew-tap (and nur-packages).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Build provenance: a free, keyless GitHub attestation binding each release
      # artifact's digest to THIS workflow run (audit F10). sync-task-status.yml
      # verifies it with `gh attestation verify` after the sha256 check, so the
      # integrity chain no longer rests solely on the same release's checksums.txt.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

      # The SBOM attest steps need CONCRETE paths. actions/attest glob-expands
      # `subject-path` but NOT `sbom-path` (it fs.stat()s the raw string), so a
      # wildcard there would stat a literal "*" filename, throw "SBOM file not
      # found", and fail the release AFTER GoReleaser has already published the
      # draft and pushed the Homebrew cask — a half-shipped release. Derive the
      # version from the archives GoReleaser actually produced (rather than the
      # ref) so the paths are exact and a missing archive fails loudly here.
      # Resolve the version from the artifacts that actually exist, and assert in
      # the same breath that every path the attest steps below are about to use
      # resolves to a real file (sbom-path is NOT glob-expanded) and that
      # checksums.txt names each archive exactly once as a whole field. This is
      # the same script build.yml runs against a snapshot on every PR — sharing it
      # is the point: the paths asserted there are literally the paths attested
      # here, so the two cannot drift.
      - name: Resolve release version + assert the artifact shape
        id: rel
        run: sh scripts/check-release-artifacts.sh dist

      # Sign each archive's SBOM with a Sigstore attestation, binding it to the
      # SAME digest the provenance step attested (subject = the tar.gz). The
      # action takes exactly one sbom-path per call, so there is one step per
      # archive (4 platforms).
      - name: Attest SBOM (linux amd64)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/furrow_${{ steps.rel.outputs.version }}_linux_amd64.tar.gz
          sbom-path: dist/furrow_${{ steps.rel.outputs.version }}_linux_amd64.tar.gz.spdx.sbom.json
      - name: Attest SBOM (linux arm64)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/furrow_${{ steps.rel.outputs.version }}_linux_arm64.tar.gz
          sbom-path: dist/furrow_${{ steps.rel.outputs.version }}_linux_arm64.tar.gz.spdx.sbom.json
      - name: Attest SBOM (darwin amd64)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/furrow_${{ steps.rel.outputs.version }}_darwin_amd64.tar.gz
          sbom-path: dist/furrow_${{ steps.rel.outputs.version }}_darwin_amd64.tar.gz.spdx.sbom.json
      - name: Attest SBOM (darwin arm64)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/furrow_${{ steps.rel.outputs.version }}_darwin_arm64.tar.gz
          sbom-path: dist/furrow_${{ steps.rel.outputs.version }}_darwin_arm64.tar.gz.spdx.sbom.json
