name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # fast-fail guard before the toolchain: the index must be single-path.
      - name: marshaller single-path guard
        run: sh scripts/check-marshal-singlepath.sh

      # Do NOT set a job-level `env: GOTOOLCHAIN: local`. setup-go resolves
      # go-version-file BEFORE it pins GOTOOLCHAIN, and if it already sees
      # `local` it skips go.mod's `toolchain` line and installs the bare `go`
      # floor — a specific, unpatched point release. Left unset, setup-go honors
      # `toolchain go1.26.4`, then exports GOTOOLCHAIN=local itself so the build
      # steps below stay pinned to the installed toolchain (no download).
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # v8 installs golangci-lint v2 (our .golangci.yml is v2 format); v6 ships v1.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: build the binary (for drift + smoke checks)
        run: go build -o /tmp/furrow ./cmd/furrow

      - name: schema drift guard
        run: |
          /tmp/furrow schema task | diff -u docs/schema/furrow.task.v2.json -
          /tmp/furrow schema meta | diff -u docs/schema/furrow.meta.v2.json -

      - name: config template drift guard
        run: |
          tmp="$(mktemp -d)"
          ( cd "$tmp" && /tmp/furrow init >/dev/null )
          diff -u config.toml "$tmp/.furrow/config.toml"

      - name: smoke test
        run: |
          /tmp/furrow version
          sb="$(mktemp -d)"; cd "$sb"
          /tmp/furrow init
          /tmp/furrow add "smoke task" -s ready
          /tmp/furrow ls --json | grep -q '"smoke task"'
          /tmp/furrow lint
