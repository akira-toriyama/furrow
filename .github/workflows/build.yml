name: build

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared Go CI core (build / vet / race-test / module-hygiene / golangci-lint v2),
  # SHA-pinned once in the hub. Adopting it closes furrow's drift: it gains -race and
  # SHA-pinned actions, and tests on macOS too (a shipped brew-cask target). go.mod
  # is floor-only, so go-version: stable builds on the current release and
  # gotoolchain: local pins it (furrow's deliberate toolchain strategy).
  ci:
    uses: akira-toriyama/.github/.github/workflows/go-ci.yml@v2
    with:
      runners: '["ubuntu-latest", "macos-latest"]'
      go-version: stable
      go-version-file: ''
      gotoolchain: local

  # Do the tests this pull request adds actually bite? The gate runs them against
  # the source BEFORE the pull request and fails the ones that all still pass — a
  # test that would have been green without its own fix is not evidence of that fix,
  # and nothing but habit was checking. Stands down on its own when there is nothing
  # to prove (no shipping change, no new test, an annotated behaviour pin), so it
  # costs a pull request nothing to carry.
  # Rationale + the two opt-outs: akira-toriyama/.github/blob/main/docs/go-bite.md
  bite:
    uses: akira-toriyama/.github/.github/workflows/go-bite.yml@v2
    with:
      go-version-file: go.mod

  # Repo-specific guards + smoke. Linux only — OS-independent; the core `test` job
  # already exercises the code on macOS.
  extras:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Guards/build/smoke only, never pushes — drop the persisted checkout
          # token (zizmor artipacked). t-yaxa
          persist-credentials: false

      # fast-fail guards before the toolchain: the index must be single-path, and
      # no ordinary write may stamp a board with the binary's schema version
      # (the 2026-07-13 silent-migration outage).
      - name: marshaller single-path guard
        run: sh scripts/check-marshal-singlepath.sh

      - name: schema write guard
        run: sh scripts/check-schema-write-guard.sh

      - name: board-hook template syntax guard
        run: |
          for h in scripts/board-hooks/post-merge scripts/board-hooks/post-rewrite scripts/board-hooks/pre-push; do
            sh -n "$h"
          done

      - name: nix flake lockstep guard (version pin + vendorHash freshness)
        run: sh scripts/check-version-lockstep.sh

      # Release config/behavior invariants a plain grep of the configs can't make
      # (ldflags -X path resolves to the real version package, draft:false, the
      # soft exit-1 fold). Pure text; complements the artifact-shape dry-run.
      - name: release-config invariants guard
        run: sh scripts/check-release-invariants.sh

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 'stable'
          cache: true

      - name: build the binary (for drift + smoke checks)
        run: go build -o /tmp/furrow ./cmd/furrow

      - name: schema drift guard
        run: |
          /tmp/furrow schema task | diff -u docs/schema/furrow.task.v2.json -
          /tmp/furrow schema meta | diff -u docs/schema/furrow.meta.v2.json -
          /tmp/furrow schema repo | diff -u docs/schema/furrow.repo.v1.json -

      - name: config template drift guard
        run: |
          tmp="$(mktemp -d)"
          ( cd "$tmp" && /tmp/furrow init >/dev/null )
          diff -u config.toml "$tmp/.furrow/config.toml"

      - name: global config template drift guard
        run: |
          gtmp="$(mktemp -d)"
          ( cd "$gtmp" && XDG_CONFIG_HOME="$gtmp/xdg" /tmp/furrow config init >/dev/null )
          diff -u config.global.toml "$gtmp/xdg/furrow/config.toml"

      - name: README pin + schema-version guard
        run: sh scripts/check-readme-parity.sh

      # The README's command table is generated from the cobra tree; a fresh
      # `furrow commands` must equal the spliced block byte-for-byte. Regen:
      # scripts/gen-command-table.sh.
      - name: README command-table drift guard
        run: |
          /tmp/furrow commands > /tmp/commands.want.md
          awk '/<!-- commands:begin/{f=1;next} /<!-- commands:end/{f=0} f' README.md > /tmp/commands.got.md
          diff -u /tmp/commands.want.md /tmp/commands.got.md

      # docs/architecture.md keeps its own hand-written command list (not the
      # generated table); this guards it against silently losing commands.
      - name: docs command-list drift guard
        run: FURROW_BIN=/tmp/furrow sh scripts/check-docs-commands.sh

      - name: smoke test
        run: |
          /tmp/furrow version
          sb="$(mktemp -d)"; cd "$sb"
          /tmp/furrow init
          /tmp/furrow add "smoke task" -s ready
          /tmp/furrow ls --json | grep -q '"smoke task"'
          /tmp/furrow lint

  # Exercise the RELEASE pipeline on every PR.
  #
  # release.yml and .goreleaser.yaml only ever run when a tag is pushed, so a
  # defect in them is discovered by tagging — and by then GoReleaser has already
  # published the draft and pushed the Homebrew cask, so a later step failing
  # means a half-shipped release. That is exactly how v0.8.0 went out: the SBOM
  # work (#108) shipped two defects that `goreleaser check` cannot see (it only
  # validates the config's schema), the first tag failed after the cask was
  # pushed, and the tap pointed at a 404 until #111 re-cut it.
  #
  # So: build the real artifacts with a snapshot, run the real SBOM pipe, and
  # assert that what lands in dist/ is what release.yml's next step actually
  # consumes. Publishing is skipped; nothing leaves the runner.
  release-dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # GoReleaser derives the snapshot version from git history
          # Snapshot build only, never pushes — drop the persisted checkout
          # token (zizmor artipacked). t-yaxa
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 'stable'
          # Mirror release.yml (cache: false there — zizmor cache-poisoning):
          # this job exists to exercise the REAL release pipeline, so its
          # toolchain setup must not drift from it. t-yaxa
          cache: false

      # Same pin as release.yml — syft is not preinstalled, and without it the
      # `sboms:` pipe (the thing that broke v0.8.0) would not run at all here.
      - name: install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: GoReleaser (snapshot — build + SBOM, no publish)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> 2"
          args: release --snapshot --clean --skip=publish,announce
        env:
          # --snapshot already skips the publishing pipes; the dummy keeps a
          # config change that moves token resolution earlier from failing here
          # for the wrong reason (a missing secret, not a real defect).
          HOMEBREW_TAP_TOKEN: dry-run-not-a-real-token

      - name: assert the artifacts match what release.yml attests
        run: sh scripts/check-release-artifacts.sh dist
