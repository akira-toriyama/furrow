name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v7

      # fast-fail guard before the toolchain: the index must be single-path.
      - name: marshaller single-path guard
        run: sh scripts/check-marshal-singlepath.sh

      # go-version: 'stable' installs the current Go release; go.mod declares
      # only a floor (no `toolchain` line), so furrow always builds on a
      # supported, patched toolchain (see flake.nix — "any current toolchain")
      # without pinning a version that non-CI builds (nix, source installs) may
      # not have. GOTOOLCHAIN: local then pins the build to that installed Go
      # (no mid-run download), keeping a run deterministic.
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # v8 installs golangci-lint v2 (our .golangci.yml is v2 format); v6 ships v1.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: build the binary (for drift + smoke checks)
        run: go build -o /tmp/furrow ./cmd/furrow

      - name: schema drift guard
        run: |
          /tmp/furrow schema task | diff -u docs/schema/furrow.task.v2.json -
          /tmp/furrow schema meta | diff -u docs/schema/furrow.meta.v2.json -

      - name: config template drift guard
        run: |
          tmp="$(mktemp -d)"
          ( cd "$tmp" && /tmp/furrow init >/dev/null )
          diff -u config.toml "$tmp/.furrow/config.toml"

      - name: smoke test
        run: |
          /tmp/furrow version
          sb="$(mktemp -d)"; cd "$sb"
          /tmp/furrow init
          /tmp/furrow add "smoke task" -s ready
          /tmp/furrow ls --json | grep -q '"smoke task"'
          /tmp/furrow lint
